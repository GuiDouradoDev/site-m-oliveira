<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Logos — M. Oliveira Admin</title>
<link rel="icon" type="image/png" sizes="256x256" href="/Icons/favicon-256.png">
<link rel="icon" type="image/png" sizes="128x128" href="/Icons/favicon-128.png">
<link rel="icon" type="image/png" sizes="64x64" href="/Icons/favicon-64.png">
<link rel="icon" type="image/png" sizes="32x32" href="/Icons/favicon-32.png">
<link rel="shortcut icon" href="/Icons/favicon.ico">
<link rel="stylesheet" href="/admin/assets/admin.css">
</head>
<body>
<nav class="sidebar">
  <div class="sidebar-header"><h2>M. Oliveira</h2><span>Painel Administrativo</span></div>
  <div class="sidebar-nav">
    <a href="/admin/dashboard">📊 Dashboard</a>
    <a href="/admin/photos">📸 Fotos</a>
    <a href="/admin/logos" class="active">🏢 Logos</a>
    <a href="/admin/content">✏️ Conteúdo</a>
    <a href="/admin/services">🛠️ Serviços</a>
    <a href="/admin/diferenciais">⭐ Diferenciais</a>
    <a href="/admin/blog">📝 Blog (Beta)</a>
    <a href="/admin/submissions">📋 Solicitações</a>
  </div>
</nav>
<div class="main">
  <div class="topbar"><h1>🏢 Logos de Clientes</h1><div class="user-info"><span id="userDisplay"></span><button onclick="logout()">Sair</button></div></div>
  <div class="content">
    <div class="card">
      <h3>Adicionar Logo</h3>
      <div class="form-grid">
        <div class="form-group"><label>Nome da Empresa</label><input type="text" id="companyName" placeholder="Ex: CPFL"></div>
        <div class="form-group"><label>Logo</label><input type="file" id="logoInput" accept="image/*"></div>
      </div>
      <button class="btn btn-primary" onclick="uploadLogo()">Adicionar Logo</button>
    </div>
    <div id="logosList"></div>
  </div>
</div>
<div class="modal-overlay" id="editModal"><div class="modal">
  <h2>Editar Logo</h2>
  <div class="form-group"><label>Nome da Empresa</label><input type="text" id="editCompanyName"></div>
  <div class="modal-actions"><button class="btn btn-outline" onclick="closeEdit()">Cancelar</button><button class="btn btn-primary" onclick="saveEdit()">Salvar</button></div>
</div></div>
<script src="/admin/assets/shared.js"></script>
<script>
document.getElementById('userDisplay').textContent = localStorage.getItem('username') || 'Admin';
let editingId = null;
async function uploadLogo() {
  const file = document.getElementById('logoInput').files[0];
  const name = document.getElementById('companyName').value;
  if (!file) return toast('Selecione um arquivo', 'error');
  if (!name) return toast('Digite o nome da empresa', 'error');
  const fd = new FormData(); fd.append('logo', file); fd.append('company_name', name);
  try {
    await api('/api/logos', { method: 'POST', body: fd });
    toast('Logo adicionada'); document.getElementById('companyName').value = ''; document.getElementById('logoInput').value = '';
    loadLogos();
  } catch (e) { toast('Erro ao adicionar', 'error'); }
}
async function loadLogos() {
  try {
    const logos = await api('/api/logos').then(r => r.json());
    const list = document.getElementById('logosList');
    if (logos.length === 0) { list.innerHTML = '<div class="empty-state"><div class="icon">🏢</div><p>Nenhum logo adicionado</p></div>'; return; }
    list.innerHTML = '<div class="grid-list">' + logos.map(l =>
      `<div class="grid-item">
        <div class="thumb" style="display:flex;align-items:center;justify-content:center;background:white;padding:16px">
          <img src="/uploads/logos/${l.filename}" alt="${l.company_name}" style="max-width:100%;max-height:100%;object-fit:contain">
        </div>
        <div class="info"><div class="name">${l.company_name}</div><div class="date">${new Date(l.created_at).toLocaleDateString('pt-BR')}</div></div>
        <div class="actions">
          <button onclick="editLogo(${l.id})" title="Editar">✏️</button>
          <button class="del-btn" onclick="deleteLogo(${l.id})" title="Excluir">🗑️</button>
        </div>
      </div>`
    ).join('') + '</div>';
  } catch (e) { toast('Erro ao carregar logos', 'error'); }
}
async function editLogo(id) {
  const logos = await api('/api/logos').then(r => r.json());
  const item = logos.find(l => l.id === id);
  if (!item) return;
  editingId = id;
  document.getElementById('editCompanyName').value = item.company_name;
  document.getElementById('editModal').classList.add('open');
}
function closeEdit() { document.getElementById('editModal').classList.remove('open'); editingId = null; }
async function saveEdit() {
  const company_name = document.getElementById('editCompanyName').value;
  if (!company_name) return toast('Digite o nome da empresa', 'error');
  await api('/api/logos/' + editingId, { method: 'PUT', body: JSON.stringify({ company_name }) });
  toast('Logo atualizado'); closeEdit(); loadLogos();
}
async function deleteLogo(id) {
  if (!confirmDelete('Excluir este logo?')) return;
  await api('/api/logos/' + id, { method: 'DELETE' });
  toast('Logo excluído'); loadLogos();
}
loadLogos();
</script>
</body>
</html>
