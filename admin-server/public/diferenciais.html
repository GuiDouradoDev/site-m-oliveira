<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Diferenciais — M. Oliveira Admin</title>
<link rel="icon" type="image/png" sizes="256x256" href="/Icons/favicon-256.png">
<link rel="icon" type="image/png" sizes="128x128" href="/Icons/favicon-128.png">
<link rel="icon" type="image/png" sizes="64x64" href="/Icons/favicon-64.png">
<link rel="icon" type="image/png" sizes="32x32" href="/Icons/favicon-32.png">
<link rel="shortcut icon" href="/Icons/favicon.ico">
<link rel="stylesheet" href="/admin/assets/admin.css">
</head>
<body>
<nav class="sidebar">
  <div class="sidebar-header"><h2>M. Oliveira</h2><span>Painel Administrativo</span></div>
  <div class="sidebar-nav">
    <a href="/admin/dashboard">📊 Dashboard</a>
    <a href="/admin/photos">📸 Fotos</a>
    <a href="/admin/logos">🏢 Logos</a>
    <a href="/admin/content">✏️ Conteúdo</a>
    <a href="/admin/services">🛠️ Serviços</a>
    <a href="/admin/diferenciais" class="active">⭐ Diferenciais</a>
    <a href="/admin/blog">📝 Blog (Beta)</a>
    <a href="/admin/submissions">📋 Solicitações</a>
  </div>
</nav>
<div class="main">
  <div class="topbar"><h1>⭐ Diferenciais</h1><div class="user-info"><span id="userDisplay"></span><button onclick="logout()">Sair</button></div></div>
  <div class="content">
    <div class="card">
      <h3>Novo Diferencial</h3>
      <div class="form-grid">
        <div class="form-group"><label>Título *</label><input type="text" id="dfTitle" placeholder="Ex: Atendimento personalizado"></div>
        <div class="form-group"><label>Ícone (emoji)</label><input type="text" id="dfIcon" value="⭐" placeholder="⭐"></div>
      </div>
      <div class="form-group"><label>Descrição</label><textarea id="dfDesc" rows="3" placeholder="Descrição do diferencial"></textarea></div>
      <button class="btn btn-primary" onclick="addDiferencial()">Adicionar Diferencial</button>
    </div>
    <div id="diferenciaisList"></div>
  </div>
</div>
<div class="modal-overlay" id="editModal"><div class="modal">
  <h2>Editar Diferencial</h2>
  <div class="form-group"><label>Título</label><input type="text" id="editTitle"></div>
  <div class="form-group"><label>Ícone (emoji)</label><input type="text" id="editIcon"></div>
  <div class="form-group"><label>Descrição</label><textarea id="editDesc" rows="4"></textarea></div>
  <div class="form-group"><label>Ordem</label><input type="number" id="editOrder" value="0"></div>
  <div class="form-group"><label><input type="checkbox" id="editActive" checked> Ativo</label></div>
  <div class="modal-actions"><button class="btn btn-outline" onclick="closeEdit()">Cancelar</button><button class="btn btn-primary" onclick="saveEdit()">Salvar</button></div>
</div></div>
<script src="/admin/assets/shared.js"></script>
<script>
document.getElementById('userDisplay').textContent = localStorage.getItem('username') || 'Admin';
let editingId = null;

async function addDiferencial() {
  const title = document.getElementById('dfTitle').value;
  const icon = document.getElementById('dfIcon').value;
  const description = document.getElementById('dfDesc').value;
  if (!title) return toast('Digite o título do diferencial', 'error');
  try {
    await api('/api/diferenciais', { method: 'POST', body: JSON.stringify({ title, icon, description }) });
    toast('Diferencial adicionado!');
    document.getElementById('dfTitle').value = ''; document.getElementById('dfDesc').value = '';
    loadDiferenciais();
  } catch (e) { toast('Erro ao adicionar', 'error'); }
}

async function loadDiferenciais() {
  try {
    const items = await api('/api/diferenciais').then(r => r.json());
    const list = document.getElementById('diferenciaisList');
    if (items.length === 0) { list.innerHTML = '<div class="empty-state"><div class="icon">⭐</div><p>Nenhum diferencial cadastrado</p></div>'; return; }
    list.innerHTML = '<div class="card"><div class="table-wrap"><table><tr><th>Ordem</th><th>Ícone</th><th>Título</th><th>Status</th><th>Ações</th></tr>' + items.map(d =>
      `<tr>
        <td>${d.sort_order}</td>
        <td style="font-size:22px">${d.icon || '⭐'}</td>
        <td><strong>${d.title}</strong></td>
        <td>${d.active ? '<span class="badge badge-success">Ativo</span>' : '<span class="badge badge-warning">Inativo</span>'}</td>
        <td class="actions-cell">
          <button class="btn btn-sm btn-outline" onclick="editItem(${d.id})">✏️</button>
          <button class="btn btn-sm btn-danger" onclick="deleteItem(${d.id})">🗑️</button>
        </td>
      </tr>`
    ).join('') + '</table></div></div>';
  } catch (e) { toast('Erro ao carregar', 'error'); }
}

async function editItem(id) {
  try {
    const all = await api('/api/diferenciais').then(r => r.json());
    const item = all.find(d => d.id === id);
    if (!item) return;
    editingId = id;
    document.getElementById('editTitle').value = item.title;
    document.getElementById('editIcon').value = item.icon || '⭐';
    document.getElementById('editDesc').value = item.description || '';
    document.getElementById('editOrder').value = item.sort_order || 0;
    document.getElementById('editActive').checked = !!item.active;
    document.getElementById('editModal').classList.add('open');
  } catch (e) { toast('Erro ao carregar', 'error'); }
}
function closeEdit() { document.getElementById('editModal').classList.remove('open'); editingId = null; }
async function saveEdit() {
  const body = {
    title: document.getElementById('editTitle').value,
    icon: document.getElementById('editIcon').value,
    description: document.getElementById('editDesc').value,
    sort_order: parseInt(document.getElementById('editOrder').value) || 0,
    active: document.getElementById('editActive').checked
  };
  await api('/api/diferenciais/' + editingId, { method: 'PUT', body: JSON.stringify(body) });
  toast('Diferencial atualizado'); closeEdit(); loadDiferenciais();
}
async function deleteItem(id) {
  if (!confirmDelete('Excluir este diferencial?')) return;
  await api('/api/diferenciais/' + id, { method: 'DELETE' });
  toast('Diferencial excluído'); loadDiferenciais();
}
loadDiferenciais();
</script>
</body>
</html>
