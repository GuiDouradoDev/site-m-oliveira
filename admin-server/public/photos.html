<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Fotos — M. Oliveira Admin</title>
<link rel="icon" type="image/png" sizes="256x256" href="/Icons/favicon-256.png">
<link rel="icon" type="image/png" sizes="128x128" href="/Icons/favicon-128.png">
<link rel="icon" type="image/png" sizes="64x64" href="/Icons/favicon-64.png">
<link rel="icon" type="image/png" sizes="32x32" href="/Icons/favicon-32.png">
<link rel="shortcut icon" href="/Icons/favicon.ico">
<link rel="stylesheet" href="/admin/assets/admin.css">
<style>
.service-tabs { display: flex; gap: 8px; flex-wrap: wrap; margin-bottom: 24px; }
.service-tab { padding: 10px 20px; border: 1px solid var(--border); border-radius: 8px; cursor: pointer; font-size: 14px; font-weight: 500; background: white; color: var(--text); transition: all .2s; display: flex; align-items: center; gap: 8px; }
.service-tab:hover { border-color: var(--accent); color: var(--accent); }
.service-tab.active { background: var(--primary-light); color: white; border-color: var(--primary-light); }
.service-tab .count { font-size: 11px; opacity: 0.6; font-weight: 400; }
.service-tab.active .count { opacity: 0.8; }
.service-section { display: none; }
.service-section.active { display: block; }
.service-section-header { display: flex; align-items: center; justify-content: space-between; margin-bottom: 16px; }
.service-section-header h2 { font-size: 18px; font-weight: 700; }
.upload-card { margin-bottom: 24px; }
</style>
</head>
<body>
<nav class="sidebar">
  <div class="sidebar-header"><h2>M. Oliveira</h2><span>Painel Administrativo</span></div>
  <div class="sidebar-nav">
    <a href="/admin/dashboard">📊 Dashboard</a>
    <a href="/admin/photos" class="active">📸 Fotos</a>
    <a href="/admin/logos">🏢 Logos</a>
    <a href="/admin/content">✏️ Conteúdo</a>
    <a href="/admin/services">🛠️ Serviços</a>
    <a href="/admin/diferenciais">⭐ Diferenciais</a>
    <a href="/admin/blog">📝 Blog (Beta)</a>
    <a href="/admin/submissions">📋 Solicitações</a>
  </div>
</nav>
<div class="main">
  <div class="topbar"><h1>📸 Fotos de Treinamento</h1><div class="user-info"><span id="userDisplay"></span><button onclick="logout()">Sair</button></div></div>
  <div class="content">
    <div class="card upload-card">
      <h3>Upload de Fotos</h3>
      <div class="form-group" style="margin-bottom:12px">
        <label>Serviço relacionado</label>
        <select id="photoService"></select>
      </div>
      <div class="upload-area" id="uploadArea" onclick="document.getElementById('fileInput').click()">
        <div class="icon">📤</div>
        <p><strong>Clique para selecionar</strong> ou arraste as imagens aqui</p>
        <p style="font-size:12px;margin-top:6px">JPG, PNG, WebP — até 10MB cada</p>
        <input type="file" id="fileInput" accept="image/*" multiple style="display:none">
      </div>
    </div>
    <div id="serviceTabs" class="service-tabs"></div>
    <div id="photoList"></div>
  </div>
</div>
<div class="modal-overlay" id="editModal"><div class="modal">
  <h2>Editar Foto</h2>
  <div class="form-group"><label>Título</label><input type="text" id="editTitle"></div>
  <div class="modal-actions"><button class="btn btn-outline" onclick="closeEdit()">Cancelar</button><button class="btn btn-primary" onclick="saveEdit()">Salvar</button></div>
</div></div>
<script src="/admin/assets/shared.js"></script>
<script>
document.getElementById('userDisplay').textContent = localStorage.getItem('username') || 'Admin';
let editingId = null;
let activeService = null;
let photosData = [];
let servicesData = [];
document.getElementById('fileInput').addEventListener('change', e => uploadFiles(e.target.files));
const uploadArea = document.getElementById('uploadArea');

uploadArea.addEventListener('dragover', e => { e.preventDefault(); uploadArea.classList.add('dragover'); });
uploadArea.addEventListener('dragleave', () => uploadArea.classList.remove('dragover'));
uploadArea.addEventListener('drop', e => { e.preventDefault(); uploadArea.classList.remove('dragover'); if (e.dataTransfer.files.length) uploadFiles(e.dataTransfer.files); });

async function uploadFiles(files) {
  const serviceId = document.getElementById('photoService').value;
  for (const file of files) {
    const fd = new FormData(); fd.append('photo', file); fd.append('service_id', serviceId);
    try {
      await api('/api/photos', { method: 'POST', body: fd });
      toast('✅ ' + file.name + ' enviada');
    } catch (e) { toast('❌ Erro ao enviar ' + file.name, 'error'); }
  }
  loadPhotos();
}

function renderPhotoCard(p) {
  return '<div class="grid-item">' +
    '<img class="thumb" src="/uploads/photos/' + p.filename + '" alt="' + p.title + '">' +
    '<div class="info"><div class="name">' + p.title + '</div><div class="date">' + new Date(p.created_at).toLocaleDateString('pt-BR') + '</div></div>' +
    '<div class="actions">' +
    '<button onclick="editPhoto(' + p.id + ',\'' + p.title.replace(/'/g,"\\'") + '\')" title="Editar">✏️</button>' +
    '<button class="del-btn" onclick="deletePhoto(' + p.id + ')" title="Excluir">🗑️</button>' +
    '</div></div>';
}

function selectService(serviceId) {
  activeService = serviceId;
  document.querySelectorAll('.service-tab').forEach(function(t) {
    t.classList.toggle('active', parseInt(t.dataset.service) === serviceId);
  });
  document.querySelectorAll('.service-section').forEach(function(s) {
    s.classList.toggle('active', parseInt(s.dataset.service) === serviceId);
  });
  // Update upload dropdown
  var sel = document.getElementById('photoService');
  if (sel) sel.value = serviceId;
}

async function loadPhotos() {
  try {
    var result = await Promise.all([
      api('/api/photos').then(function(r) { return r.json(); }),
      api('/api/services').then(function(r) { return r.json(); })
    ]);
    photosData = result[0];
    servicesData = result[1];

    // Group by service_id
    var groups = {};
    photosData.forEach(function(p) {
      var sid = p.service_id || 0;
      if (!groups[sid]) groups[sid] = [];
      groups[sid].push(p);
    });

    // Only show training categories (inactive services) + unassigned
    var trainingServices = servicesData.filter(function(s) { return !s.active; });
    var unassignedPhotos = groups[0] || [];

    // Determine which service to show (default to first if none selected)
    if (activeService === null) {
      if (trainingServices.length > 0) {
        activeService = trainingServices[0].id;
      } else if (unassignedPhotos.length > 0) {
        activeService = 0;
      }
    }

    // Render tabs
    var tabsHtml = '';
    trainingServices.forEach(function(svc) {
      var count = groups[svc.id] ? groups[svc.id].length : 0;
      var isActive = activeService === svc.id;
      tabsHtml += '<div class="service-tab' + (isActive ? ' active' : '') + '" data-service="' + svc.id + '" onclick="selectService(' + svc.id + ')">' + (svc.icon || '📋') + ' ' + svc.title + ' <span class="count">(' + count + ')</span></div>';
    });
    // Unassigned tab
    if (unassignedPhotos.length > 0) {
      var isActive = activeService === 0;
      tabsHtml += '<div class="service-tab' + (isActive ? ' active' : '') + '" data-service="0" onclick="selectService(0)">📂 Sem categoria <span class="count">(' + unassignedPhotos.length + ')</span></div>';
    }

    var tabsContainer = document.getElementById('serviceTabs');
    if (trainingServices.length === 0 && unassignedPhotos.length === 0) {
      tabsContainer.innerHTML = '<div class="empty-state" style="padding:20px"><p>Nenhuma categoria de treinamento cadastrada.</p></div>';
    } else {
      tabsContainer.innerHTML = tabsHtml;
    }

    // Render photo sections
    var list = document.getElementById('photoList');
    var sectionsHtml = '';
    trainingServices.forEach(function(svc) {
      var isActive = activeService === svc.id;
      var fotos = groups[svc.id] || [];
      sectionsHtml += '<div class="service-section' + (isActive ? ' active' : '') + '" data-service="' + svc.id + '">';
      sectionsHtml += '<div class="service-section-header"><h2>' + (svc.icon || '📋') + ' ' + svc.title + '</h2><span style="color:var(--text-light);font-size:13px">' + fotos.length + ' foto(s)</span></div>';
      if (fotos.length === 0) {
        sectionsHtml += '<div class="empty-state"><div class="icon">📸</div><p>Nenhuma foto nesta categoria ainda</p><p style="font-size:12px;margin-top:8px">Use o upload acima para adicionar fotos</p></div>';
      } else {
        sectionsHtml += '<div class="grid-list">' + fotos.map(renderPhotoCard).join('') + '</div>';
      }
      sectionsHtml += '</div>';
    });
    // Unassigned section
    if (unassignedPhotos.length > 0) {
      var isActive = activeService === 0;
      sectionsHtml += '<div class="service-section' + (isActive ? ' active' : '') + '" data-service="0">';
      sectionsHtml += '<div class="service-section-header"><h2>📂 Sem categoria</h2><span style="color:var(--text-light);font-size:13px">' + unassignedPhotos.length + ' foto(s)</span></div>';
      sectionsHtml += '<div class="grid-list">' + unassignedPhotos.map(renderPhotoCard).join('') + '</div></div>';
    }
    list.innerHTML = sectionsHtml;
    // Sync upload dropdown (only training categories)
    var sel = document.getElementById('photoService');
    sel.innerHTML = '';
    trainingServices.forEach(function(s) {
      var opt = document.createElement('option');
      opt.value = s.id;
      opt.textContent = (s.icon || '📋') + ' ' + s.title;
      if (s.id === activeService) opt.selected = true;
      sel.appendChild(opt);
    });
  } catch (e) { toast('Erro ao carregar fotos', 'error'); }
}

function editPhoto(id, title) { editingId = id; document.getElementById('editTitle').value = title; document.getElementById('editModal').classList.add('open'); }
function closeEdit() { document.getElementById('editModal').classList.remove('open'); editingId = null; }
async function saveEdit() {
  var title = document.getElementById('editTitle').value;
  if (!title) return toast('Digite um título', 'error');
  await api('/api/photos/' + editingId, { method: 'PUT', body: JSON.stringify({ title }) });
  toast('Título atualizado'); closeEdit(); loadPhotos();
}
async function deletePhoto(id) {
  if (!confirmDelete('Excluir esta foto?')) return;
  await api('/api/photos/' + id, { method: 'DELETE' });
  toast('Foto excluída'); loadPhotos();
}
loadPhotos();
</script>
</body>
</html>
