<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>M. Oliveira | Segurança do Trabalho</title>
<link rel="icon" type="image/png" sizes="256x256" href="/Icons/favicon-256.png">
<link rel="icon" type="image/png" sizes="128x128" href="/Icons/favicon-128.png">
<link rel="icon" type="image/png" sizes="64x64" href="/Icons/favicon-64.png">
<link rel="icon" type="image/png" sizes="32x32" href="/Icons/favicon-32.png">
<link rel="shortcut icon" href="/Icons/favicon.ico">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Barlow:wght@300;400;500;600;700&display=swap" rel="stylesheet">
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    font-family: 'Barlow', sans-serif;
    background: #0a1628;
    color: #fff;
    min-height: 100vh;
    display: flex;
    align-items: center;
    justify-content: center;
    padding: 24px;
  }
  .container {
    text-align: center;
    max-width: 560px;
  }
  .logo {
    width: 120px;
    height: 120px;
    margin: 0 auto 16px;
    display: block;
    filter: brightness(0) invert(1);
  }
  .icon {
    font-size: 48px;
    margin-bottom: 20px;
    display: block;
  }
  h1 {
    font-size: 28px;
    font-weight: 700;
    margin-bottom: 12px;
    color: #fff;
  }
  p {
    font-size: 16px;
    line-height: 1.6;
    color: #94a3b8;
    margin-bottom: 8px;
  }
  .bar {
    width: 60px;
    height: 3px;
    background: #3b82f6;
    margin: 24px auto;
    border-radius: 2px;
  }
  .footer {
    margin-top: 48px;
    font-size: 13px;
    color: #475569;
  }
</style>
</head>
<body>
<div class="container">
  <img class="logo" src="/Icons/icone-m-oliveira.png" alt="M. Oliveira">
  <span class="icon">🛠️</span>
  <h1>Site em Manutenção</h1>
  <div class="bar"></div>
  <p>Estamos atualizando nosso site para oferecer um atendimento ainda melhor.</p>
  <p>Em breve estaremos de volta com novidades!</p>
  <p class="footer">M. Oliveira</p>
</div>
</body>
</html>
